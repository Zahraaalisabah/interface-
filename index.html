<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم شركة نقطه التحول</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- الهيدر -->
    <header class="main-header">

        <div class="header-left">
            <div id="time"></div>
            <div id="date"></div>
        </div>

        <div class="header-center">
            نقطه التحول للتسويق والاعلانات
        </div>

        <div class="header-right">
            <img src="image/logo.png" alt="logo">
        </div>

    </header>


    <!-- المحتوى الرئيسي -->
    <div class="container" id="mainContainer">

        <!-- الصف العلوي -->
        <div class="top-row">

            <div class="icon-card" data-type="rawatib">
                <img src="image/salary.png" class="icon-img">
                <span>أشرطة الرواتب</span>
            </div>

            <div class="icon-card special" data-type="special">
                <img src="image/icon-card.png" class="icon-img">
                <span>خاص جداً</span>
            </div>

            <div class="icon-card" data-type="moqablat">
                <img src="image/interview.png" class="icon-img">
                <span>مقابلات</span>
            </div>

            <div class="icon-card" data-type="mutaba3a">
                <img src="image/folllow.png" class="icon-img">
                <span>المتابعة</span>
            </div>

        </div>


        <!-- الصف السفلي -->
        <div class="bottom-row">

            <div class="icon-card" data-type="print">
                <img src="image/print.png" class="icon-img">
                <span>طباعة وصول</span>
            </div>

            <div class="icon-card" data-type="duyun">
                <img src="image/debt.png" class="icon-img">
                <span>الديون</span>
            </div>

            <div class="icon-card" id="new-employee-card" data-type="new">
                <img src="image/new.png" class="icon-img">
                <span>جديد زبون</span>
            </div>

            <div class="icon-card" data-type="attendance">
                <img src="image/attendance.png" class="icon-img">
                <span>حضور الموظفين</span>
            </div>

        </div>

    </div>


    

    <script src="script.js"></script>

</body>

</html>
